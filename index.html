<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zip2Addr</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">zip2Addr</h1>
        <div class="flex gap-2">
            <input type="text" id="zipcode" placeholder="郵便番号 (例: 1000001 または 100-0001)" class="border border-gray-300 p-2 rounded w-full">
            <button id="search-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">検索</button>
        </div>
        <div id="result" class="mt-6 p-4 bg-gray-100 rounded text-gray-700 hidden"></div>
    </div>
    <script src="src/script.js"></script>
</body>
</html>
